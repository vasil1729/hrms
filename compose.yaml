name: hrms

networks:
  internal:
    driver: bridge
    internal: true
  proxy:
    external: true
    name: caddy-proxy

volumes:
  db-data:
  sites:
  assets:
  logs:

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETUID
    - SETGID

x-restart: &restart
  restart: unless-stopped

services:
  db:
    image: mariadb:10.8
    <<: *security
    restart: unless-stopped
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?}
      MYSQL_DATABASE: ${DB_NAME:-hrms}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:?}
      MARIADB_DATABASE: ${DB_NAME:-hrms}
      TZ: ${TZ:-UTC}
    command: |
      mariadbd
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-format=barracuda
      --innodb-file-per-table=1
      --innodb-large-prefix=1
      --max-allowed-packet=256M
      --innodb-log-file-size=256M
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "--silent"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    command: redis-server --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    command: redis-server --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 128m

  configurator:
    build:
      context: .
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-hrms}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      SITE_NAME: ${SITE_NAME:-hrms.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      BENCH_APPS: erpnext,hrms
      INSTALL_APPS: erpnext,hrms
      PROXY_FIX: "true"
      WORKERS: ${WORKERS:-4}
      BACKUP_LIMIT: ${BACKUP_LIMIT:-14}
      TZ: ${TZ:-UTC}
      HRMS_ADMIN_EMAIL: ${HRMS_ADMIN_EMAIL:-admin@example.com}
      HRMS_ADMIN_PASSWORD: ${HRMS_ADMIN_PASSWORD:-CHANGE_ME}
      HRMS_ADMIN_FIRST_NAME: ${HRMS_ADMIN_FIRST_NAME:-Admin}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
      - ./config/setup-site.py:/home/frappe/setup-site.py:ro
      - ./scripts/setup.sh:/home/frappe/setup.sh:ro
    command: bash /home/frappe/setup.sh
    restart: "no"
    mem_limit: 2g

  backend:
    container_name: hrms-backend
    build:
      context: .
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
      - proxy
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      DB_NAME: ${DB_NAME:-hrms}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      SITE_NAME: ${SITE_NAME:-hrms.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      BENCH_APPS: erpnext,hrms
      INSTALL_APPS: erpnext,hrms
      PROXY_FIX: "true"
      WORKERS: ${WORKERS:-4}
      BACKUP_LIMIT: ${BACKUP_LIMIT:-14}
      TZ: ${TZ:-UTC}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
    command:
      - /home/frappe/frappe-bench/env/bin/gunicorn
      - --chdir=/home/frappe/frappe-bench/sites
      - --bind=0.0.0.0:8000
      - --threads=4
      - --workers=${WORKERS:-4}
      - --worker-class=gthread
      - --worker-tmp-dir=/dev/shm
      - --timeout=120
      - --preload
      - frappe.app:application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/method/ping"]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 5
    mem_limit: 2g

  worker:
    build:
      context: .
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      DB_NAME: ${DB_NAME:-hrms}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      SITE_NAME: ${SITE_NAME:-hrms.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      BENCH_APPS: erpnext,hrms
      INSTALL_APPS: erpnext,hrms
      PROXY_FIX: "true"
      WORKERS: ${WORKERS:-4}
      BACKUP_LIMIT: ${BACKUP_LIMIT:-14}
      TZ: ${TZ:-UTC}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
    command:
      - bench
      - worker
      - --queue
      - default,long,short
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bench worker' || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
    mem_limit: 1g

  scheduler:
    build:
      context: .
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      DB_NAME: ${DB_NAME:-hrms}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      SITE_NAME: ${SITE_NAME:-hrms.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      BENCH_APPS: erpnext,hrms
      INSTALL_APPS: erpnext,hrms
      PROXY_FIX: "true"
      WORKERS: ${WORKERS:-4}
      BACKUP_LIMIT: ${BACKUP_LIMIT:-14}
      TZ: ${TZ:-UTC}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
    command:
      - bench
      - schedule
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bench schedule' || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m

  websocket:
    build:
      context: .
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
      - proxy
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      DB_NAME: ${DB_NAME:-hrms}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
      SITE_NAME: ${SITE_NAME:-hrms.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?}
      BENCH_APPS: erpnext,hrms
      INSTALL_APPS: erpnext,hrms
      PROXY_FIX: "true"
      WORKERS: ${WORKERS:-4}
      BACKUP_LIMIT: ${BACKUP_LIMIT:-14}
      TZ: ${TZ:-UTC}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m

  frontend:
    container_name: hrms-frontend
    image: hrms-custom:${ERPNext_VERSION:-v15.41.0}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    networks:
      - internal
      - proxy
    depends_on:
      backend:
        condition: service_started
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/sites/assets
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    command: nginx -g 'daemon off;'
    mem_limit: 128m
